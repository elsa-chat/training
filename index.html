<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">SEMOSS Training - Spain 2026</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="config.js"></script>
</head>
<body>
    <!-- Sidebar Navigation -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">S</span>
                <div class="logo-text">
                    <span class="logo-title" id="logoTitle">SEMOSS Training</span>
                    <span class="logo-subtitle" id="logoSubtitle">Spain 2026</span>
                </div>
            </div>
        </div>
        <div class="sidebar-nav" id="sidebarNav">
            <!-- Populated by JS -->
        </div>
        <div class="sidebar-footer">
            <div class="schedule-link" onclick="toggleSchedule()">Schedule</div>
        </div>
    </nav>

    <!-- Sidebar Toggle -->
    <button id="sidebarToggle" class="sidebar-toggle" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect y="3" width="20" height="2" rx="1" fill="currentColor"/>
            <rect y="9" width="20" height="2" rx="1" fill="currentColor"/>
            <rect y="15" width="20" height="2" rx="1" fill="currentColor"/>
        </svg>
    </button>

    <!-- Main Content -->
    <main id="mainContent" class="main-content">
        <div class="slide-container">
            <div class="slide-label" id="slideLabel"></div>
            <div class="slide-content" id="slideContent">
                <!-- Slide content rendered here -->
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-bar">
            <div class="slide-counter" id="slideCounter"></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn" id="prevBtn" onclick="prevSlide()">Prev</button>
                <button class="nav-btn nav-btn-primary" id="nextBtn" onclick="nextSlide()">Next</button>
            </div>
        </div>
    </main>

    <!-- Schedule Modal -->
    <div id="scheduleModal" class="modal" onclick="closeModal(event)">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Week Schedule</h2>
                <button class="modal-close" onclick="toggleSchedule()">&times;</button>
            </div>
            <div class="modal-body" id="scheduleBody">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Component library (must load before data files) -->
    <script src="js/components.js?v=2"></script>

    <!-- Topic slide modules -->
    <script src="data/slides/welcome/welcome.js"></script>

    <script src="data/slides/platform/fundamentals.js"></script>
    <script src="data/slides/platform/engines.js"></script>
    <script src="data/slides/platform/pixel-reactors.js"></script>

    <script src="data/slides/apps/app-fundamentals.js"></script>
    <script src="data/slides/apps/pro-code-apps.js"></script>

    <script src="data/slides/reactors/custom-reactors.js"></script>
    <script src="data/slides/reactors2/reactor-framework.js"></script>
    <script src="data/slides/basepython/base-python.js"></script>
    <script src="data/slides/python/custom-python.js"></script>
    <script src="data/slides/day1-activity.js"></script>

    <script src="data/slides/ai/insight-room-session.js"></script>
    <script src="data/slides/ai/message-structure.js"></script>
    <script src="data/slides/ai/model-logs.js"></script>
    <script src="data/slides/ai/api-endpoints.js"></script>

    <script src="data/slides/playground/playground.js"></script>

    <script src="data/slides/mcp/mcp-fundamentals.js"></script>
    <script src="data/slides/mcp/building-consuming-mcp.js"></script>
    <script src="data/slides/mcp/mcp-ui-premade.js"></script>

    <script src="data/slides/infra/docker.js"></script>
    <script src="data/slides/infra/security-auth.js"></script>
    <script src="data/slides/infra/admin.js"></script>
    <script src="data/slides/capstone/capstone-project.js"></script>

    <!-- Slide library + session plan -->
    <script src="data/slides/index.js"></script>
    <script src="data/sessions/index.js"></script>

    <!-- App controller (must load last) -->
    <script src="js/app.js"></script>
</body>
</html>
